<!DOCTYPE html>
<html>
<head>
    <title>Clear Cookies</title>
</head>
<body>
    <h1>Clearing cookies...</h1>
    <script>
        // Удаляем все cookies для localhost
        document.cookie.split(";").forEach(function(c) { 
            document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
        });
        
        // Также удаляем через разные пути
        ['auth_token', 'admin_token', 'refresh_token'].forEach(name => {
            document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=localhost';
        });
        
        alert('Cookies cleared! Redirecting to login...');
        window.location.href = '/login';
    </script>
</body>
</html>
